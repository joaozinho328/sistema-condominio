<!DOCTYPE html>
<html>

<head>

    <title>Cadastro</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <img src="{{ url_for('static', filename='logo.png') }}"
        class="logo-login">

        <h2>Criar Conta</h2>

        <p>
            Cadastre-se para acessar o sistema
        </p>

        <form method="POST">

            <input type="text"
                   name="nome"
                   class="form-control mb-3"
                   placeholder="Nome Completo"
                   required>

            <input type="email"
                   name="email"
                   class="form-control mb-3"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="senha"
                   class="form-control mb-3"
                   placeholder="Senha"
                   required>

            <input type="text"
                   name="bloco"
                   class="form-control mb-3"
                   placeholder="Bloco"
                   required>

            <input type="text"
                   name="apartamento"
                   class="form-control mb-3"
                   placeholder="Apartamento"
                   required>

            <button type="submit"
                    class="btn btn-primary w-100">
                Criar Conta
            </button>

        </form>

        <hr>

        <a href="/login">
            Já possui conta? Entrar
        </a>

    </div>

</div>

</body>
</html>
