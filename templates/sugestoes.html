{% extends "base.html" %}

{% block conteudo %}

<h1>Sugestões</h1>

<form method="POST">

    <textarea name="mensagem"
              placeholder="Digite sua sugestão"
              rows="5"
              style="width:100%; padding:10px;"></textarea>

    <br><br>

    <button type="submit">
        Enviar Sugestão
    </button>

</form>

<hr>

{% for sugestao in sugestoes %}

<div class="card">

    <p>{{ sugestao[2] }}</p>

</div>

{% endfor %}

{% endblock %}
