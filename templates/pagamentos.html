{% extends "base.html" %}

{% block conteudo %}

<div class="card shadow border-0 p-4">

    <h2 class="mb-4">
        Área de Pagamentos
    </h2>

    <table class="table table-hover">

        <thead>

            <tr>

                <th>Descrição</th>
                <th>Valor</th>
                <th>Status</th>

            </tr>

        </thead>

        <tbody>

            {% for pagamento in pagamentos %}

            <tr>

                <td>{{ pagamento[2] }}</td>

                <td>
                    R$ {{ pagamento[3] }}
                </td>

                <td>

                    {% if pagamento[4] == "Pendente" %}

                    <span class="badge bg-danger">
                        Pendente
                    </span>

                    {% else %}

                    <span class="badge bg-success">
                        Pago
                    </span>

                    {% endif %}

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
