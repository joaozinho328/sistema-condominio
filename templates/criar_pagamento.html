{% extends "base.html" %}

{% block conteudo %}

<div class="card p-4 shadow">

    <h2 class="mb-4">
        Nova Cobrança
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label>Morador</label>

            <select
                name="usuario_id"
                class="form-select"
                required>

                {% for usuario in usuarios %}

                <option value="{{ usuario[0] }}">
                    {{ usuario[1] }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label>Descrição</label>

            <input
                type="text"
                name="descricao"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Valor</label>

            <input
                type="number"
                step="0.01"
                name="valor"
                class="form-control"
                required>

        </div>

        <button
            class="btn btn-primary">

            Criar Cobrança

        </button>

    </form>

</div>

{% endblock %}
